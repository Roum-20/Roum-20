<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 570" width="100%" height="100%">
  <defs>
    <!-- Gradient for Border Glow -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff">
        <animate attributeName="stop-color" values="#00f5ff; #8a2be2; #00ff88; #00f5ff" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8a2be2">
        <animate attributeName="stop-color" values="#8a2be2; #00ff88; #00f5ff; #8a2be2" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <!-- Neon Drop Shadow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Scanline Pattern -->
    <pattern id="scanlines" width="100" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100" y2="0" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&amp;display=swap');

    .bg { fill: #0b0f19; rx: 12px; }
    .border { fill: none; stroke: url(#borderGrad); stroke-width: 2px; rx: 12px; }
    .header-bar { fill: #161b26; rx: 12px 12px 0 0; }
    .dot-red { fill: #ff5f56; }
    .dot-yellow { fill: #ffbd2e; }
    .dot-green { fill: #27c93f; }
    .header-title { font-family: 'Fira Code', monospace; font-size: 13px; fill: #8b949e; font-weight: 600; }
    
    .terminal-text {
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 13.5px;
      white-space: preserve;
    }

    .ascii-logo {
      fill: #00f5ff;
      filter: drop-shadow(0px 0px 4px rgba(0, 245, 255, 0.6));
      animation: logoPulse 4s ease-in-out indefinite alternate;
    }

    .user-header { fill: #00ff88; font-weight: 700; }
    .divider { fill: #485165; }
    .label { fill: #bd93f9; font-weight: 600; }
    .dots { fill: #44475a; }
    .val-os { fill: #f1fa8c; }
    .val-info { fill: #f8f8f2; }
    .val-sec { fill: #ff5555; font-weight: 600; }
    .val-lang { fill: #ff79c6; }
    .val-contact { fill: #8be9fd; }
    .stats-header { fill: #ffb86c; font-weight: 700; }
    .stats-val { fill: #50fa7b; }

    /* Keyframe Animations */
    @keyframes logoPulse {
      0% { filter: drop-shadow(0px 0px 3px rgba(0, 245, 255, 0.4)); fill: #00f5ff; }
      50% { filter: drop-shadow(0px 0px 9px rgba(138, 43, 226, 0.8)); fill: #a742ff; }
      100% { filter: drop-shadow(0px 0px 3px rgba(0, 245, 255, 0.4)); fill: #00f5ff; }
    }

    .line-fade {
      opacity: 0;
      animation: fadeIn 0.6s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cursor {
      fill: #00ff88;
      animation: blink 1s step-start indefinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .scanline-overlay {
      fill: url(#scanlines);
      pointer-events: none;
    }

    /* Staggered delay for terminal lines */
    .l1 { animation-delay: 0.1s; }
    .l2 { animation-delay: 0.2s; }
    .l3 { animation-delay: 0.3s; }
    .l4 { animation-delay: 0.4s; }
    .l5 { animation-delay: 0.5s; }
    .l6 { animation-delay: 0.6s; }
    .l7 { animation-delay: 0.7s; }
    .l8 { animation-delay: 0.8s; }
    .l9 { animation-delay: 0.9s; }
    .l10 { animation-delay: 1.0s; }
    .l11 { animation-delay: 1.1s; }
    .l12 { animation-delay: 1.2s; }
    .l13 { animation-delay: 1.3s; }
    .l14 { animation-delay: 1.4s; }
    .l15 { animation-delay: 1.5s; }
    .l16 { animation-delay: 1.6s; }
    .l17 { animation-delay: 1.7s; }
    .l18 { animation-delay: 1.8s; }
    .l19 { animation-delay: 1.9s; }
    .l20 { animation-delay: 2.0s; }
    .l21 { animation-delay: 2.1s; }
    .l22 { animation-delay: 2.2s; }
    .l23 { animation-delay: 2.3s; }
    .l24 { animation-delay: 2.4s; }
    .l25 { animation-delay: 2.5s; }
  </style>

